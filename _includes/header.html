<header class="site-header">

  <div class="wrapper">

    <a class="site-title" href="{{ site.baseurl }}/">
      <span class="site-title-mark">puradawid</span>
      <span class="site-title-text">Software Engineering Blog</span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <button class="menu-icon" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="site-nav-links">
        <span class="menu-icon-bar" aria-hidden="true"></span>
        <span class="menu-icon-bar" aria-hidden="true"></span>
        <span class="menu-icon-bar" aria-hidden="true"></span>
      </button>

      <div class="trigger" id="site-nav-links">
        {% assign nav_pages = site.pages | sort: 'order' %}
        {% for my_page in nav_pages %}
          {% if my_page.title and my_page.title != "AEM Consulting" %}
          <a class="page-link" href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a>
          {% endif %}
        {% endfor %}
        <a class="page-link" href="{{ '/aem-consulting.html' | prepend: site.baseurl }}">Contact</a>
      </div>
    </nav>

  </div>

  <script>
  if (document.location.href.indexOf("https://puradawid.github.io/") == 0) {
     document.location.host = "puradawid.pro";
  }

  (function () {
    var header = document.querySelector('.site-header');
    var nav = document.querySelector('.site-nav');
    var scrollY = 0;
    if (!header || !nav) {
      return;
    }

    var button = nav.querySelector('.menu-icon');
    var trigger = nav.querySelector('.trigger');
    if (!button || !trigger) {
      return;
    }

    var syncOverlayOffset = function () {
      var headerBottom = Math.ceil(header.getBoundingClientRect().bottom);
      nav.style.setProperty('--mobile-nav-top', (headerBottom + 10) + 'px');
    };

    var setOpen = function (isOpen) {
      syncOverlayOffset();
      button.setAttribute('aria-expanded', String(isOpen));
      button.setAttribute('aria-label', isOpen ? 'Close navigation menu' : 'Open navigation menu');
      nav.classList.toggle('is-open', isOpen);
      document.body.classList.toggle('mobile-nav-open', isOpen);

      if (isOpen) {
        scrollY = window.scrollY;
        document.body.style.top = '-' + scrollY + 'px';
        document.body.style.position = 'fixed';
        document.body.style.width = '100%';
      } else {
        document.body.style.top = '';
        document.body.style.position = '';
        document.body.style.width = '';
        window.scrollTo(0, scrollY);
      }
    };

    button.addEventListener('click', function (event) {
      event.stopPropagation();
      var expanded = button.getAttribute('aria-expanded') === 'true';
      setOpen(!expanded);
    });

    trigger.addEventListener('click', function (event) {
      if (event.target.classList.contains('page-link')) {
        setOpen(false);
      }
    });

    document.addEventListener('click', function (event) {
      if (!nav.contains(event.target)) {
        setOpen(false);
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        setOpen(false);
      }
    });

    window.addEventListener('resize', syncOverlayOffset);

    syncOverlayOffset();
  }());
  </script>

</header>
