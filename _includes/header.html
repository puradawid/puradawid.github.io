<header class="site-header">

  <div class="wrapper">

    <a class="site-title" href="{{ site.baseurl }}/">
      <span class="site-title-mark">puradawid</span>
      <span class="site-title-text">Software Engineering Blog</span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <button class="menu-icon" type="button" aria-expanded="false" aria-controls="site-nav-links">
        <span class="menu-icon-label">Menu</span>
        <svg viewBox="0 0 18 15" aria-hidden="true">
          <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0h15.031C17.335,0,18,0.665,18,1.484L18,1.484z"/>
          <path d="M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0c0-0.82,0.665-1.484,1.484-1.484h15.031C17.335,6.031,18,6.696,18,7.516L18,7.516z"/>
          <path d="M18,13.516C18,14.335,17.335,15,16.516,15H1.484C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.484,1.484-1.484h15.031C17.335,12.031,18,12.696,18,13.516L18,13.516z"/>
        </svg>
      </button>

      <div class="trigger" id="site-nav-links">
        {% assign nav_pages = site.pages | sort: 'order' %}
        {% for my_page in nav_pages %}
          {% if my_page.title and my_page.title != "AEM Consulting" %}
          <a class="page-link" href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a>
          {% endif %}
        {% endfor %}
        <a class="page-link page-link-cta" href="{{ '/aem-consulting.html' | prepend: site.baseurl }}">Contact</a>
      </div>
    </nav>

  </div>

  <script>
  if (document.location.href.indexOf("https://puradawid.github.io/") == 0) {
     document.location.host = "puradawid.pro";
  }

  (function () {
    var nav = document.querySelector('.site-nav');
    if (!nav) {
      return;
    }

    var button = nav.querySelector('.menu-icon');
    var trigger = nav.querySelector('.trigger');
    if (!button || !trigger) {
      return;
    }

    button.addEventListener('click', function () {
      var expanded = button.getAttribute('aria-expanded') === 'true';
      button.setAttribute('aria-expanded', String(!expanded));
      nav.classList.toggle('is-open', !expanded);
    });

    trigger.addEventListener('click', function (event) {
      if (event.target.classList.contains('page-link')) {
        button.setAttribute('aria-expanded', 'false');
        nav.classList.remove('is-open');
      }
    });
  }());
  </script>

</header>
